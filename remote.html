<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JARVIS MIRROR</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        #mirrorContainer {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        #mirrorFrame {
            width: 100%; height: 100%;
            object-fit: contain;
            cursor: crosshair;
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
            user-select: none;
        }
        #status {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,242,255,0.2); border: 1px solid #00f2ff;
            color: #00f2ff; padding: 5px 12px; border-radius: 20px; font-size: 10px;
            pointer-events: none; z-index: 100;
        }
        .btn-keyboard {
            position: absolute; bottom: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(0,242,255,0.8);
            border-radius: 50%; color: #000; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,242,255,0.5);
            z-index: 100; cursor: pointer; border: none;
        }
        #hiddenInput {
            position: absolute; top: -100px; opacity: 0;
        }
    </style>
</head>
<body>
    <div id="status">ANSLUTER TILL JARVIS...</div>
    <div id="mirrorContainer">
        <img id="mirrorFrame" src="" alt="Mirror Stream">
    </div>
    
    <button class="btn-keyboard" onclick="focusInput()">⌨</button>
    <input type="text" id="hiddenInput">

    <script>
        const frame = document.getElementById('mirrorFrame');
        const status = document.getElementById('status');
        const hiddenInput = document.getElementById('hiddenInput');
        
        // --- DYNAMISK HOST EXTRAKTION ---
        const host = window.location.hostname || '127.0.0.1';
        const ws = new WebSocket(`ws://${host}:9998`);

        ws.onopen = () => {
            status.innerText = "MIRROR GUARD AKTIV";
            status.style.borderColor = "#00ff88";
            status.style.color = "#00ff88";
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'frame') {
                frame.src = msg.data;
            }
        };

        ws.onclose = () => {
            status.innerText = "ANSLUTNING BRUTEN";
            status.style.borderColor = "#f43f5e";
            status.style.color = "#f43f5e";
        };

        // --- FJÄRRSTYRNING: TOUCH TILL MUS ---
        frame.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = frame.getBoundingClientRect();
            
            // Beräkna relativa koordinater (0 till 1)
            const x = (touch.clientX - rect.left) / rect.width;
            const y = (touch.clientY - rect.top) / rect.height;

            // Skicka till datorn (som i sin tur mappar mot fönsterstorlek)
            // Eftersom Electron-fönstret anpassas efter mobilen så är 
            // x/y direkt översättbara mot fönstrets bredd/höjd
            ws.send(JSON.stringify({
                type: 'input',
                input: {
                    type: 'mouseDown',
                    x: x * 400, // Den bredd vi satte i main.js (Adaptivt)
                    y: y * 850  // Den höjd vi satte i main.js (Adaptivt)
                }
            }));
        });

        frame.addEventListener('touchend', (e) => {
            ws.send(JSON.stringify({
                type: 'input',
                input: { type: 'mouseUp', x: 0, y: 0 }
            }));
        });

        // --- SKRIVA PÅ DISTANS ---
        function focusInput() {
            hiddenInput.focus();
        }

        hiddenInput.addEventListener('input', (e) => {
            const char = e.data;
            if (char) {
                ws.send(JSON.stringify({ type: 'key', key: char }));
                hiddenInput.value = ''; // Rensa för nästa tecken
            }
        });

        // Hantera Delete
        hiddenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                ws.send(JSON.stringify({ type: 'key', key: 'Enter' }));
                hiddenInput.value = '';
            } else if (e.key === 'Backspace') {
                ws.send(JSON.stringify({ type: 'key', key: 'Backspace' }));
            }
        });
    </script>
</body>
</html>
